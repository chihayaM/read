<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>墨阅 - Web 阅读器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ===== CSS Variables & Themes ===== */
:root {
  --bg: #fafafa;
  --bg-secondary: #fff;
  --text: #333;
  --text-secondary: #666;
  --border: #e0e0e0;
  --accent: #2196F3;
  --accent-light: #e3f2fd;
  --shadow: rgba(0,0,0,0.08);
  --sidebar-bg: #fff;
  --hover: #f5f5f5;
  --toolbar-bg: rgba(255,255,255,0.95);
  --card-bg: #fff;
  --card-hover: #f0f7ff;
  --overlay: rgba(0,0,0,0.4);
  --scrollbar: #ccc;
  --scrollbar-hover: #aaa;
}
[data-theme="dark"] {
  --bg: #1a1a2e;
  --bg-secondary: #16213e;
  --text: #e0e0e0;
  --text-secondary: #a0a0a0;
  --border: #2a2a4a;
  --accent: #64b5f6;
  --accent-light: #1e3a5f;
  --shadow: rgba(0,0,0,0.3);
  --sidebar-bg: #16213e;
  --hover: #1e2d4a;
  --toolbar-bg: rgba(26,26,46,0.95);
  --card-bg: #16213e;
  --card-hover: #1e3a5f;
  --overlay: rgba(0,0,0,0.6);
  --scrollbar: #444;
  --scrollbar-hover: #666;
}
[data-theme="sepia"] {
  --bg: #f4ecd8;
  --bg-secondary: #faf5e8;
  --text: #5b4636;
  --text-secondary: #8a7560;
  --border: #d4c5a9;
  --accent: #8b6914;
  --accent-light: #f0e6c8;
  --shadow: rgba(91,70,54,0.1);
  --sidebar-bg: #faf5e8;
  --hover: #efe7d0;
  --toolbar-bg: rgba(244,236,216,0.95);
  --card-bg: #faf5e8;
  --card-hover: #f0e6c8;
  --overlay: rgba(91,70,54,0.3);
  --scrollbar: #c4b08a;
  --scrollbar-hover: #a89060;
}
[data-theme="green"] {
  --bg: #e8f5e9;
  --bg-secondary: #f1f8f2;
  --text: #2e4a32;
  --text-secondary: #5a7d5e;
  --border: #c8e6c9;
  --accent: #43a047;
  --accent-light: #e8f5e9;
  --shadow: rgba(46,74,50,0.1);
  --sidebar-bg: #f1f8f2;
  --hover: #d7eed8;
  --toolbar-bg: rgba(232,245,233,0.95);
  --card-bg: #f1f8f2;
  --card-hover: #d7eed8;
  --overlay: rgba(46,74,50,0.3);
  --scrollbar: #a5d6a7;
  --scrollbar-hover: #81c784;
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background 0.3s, color 0.3s;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }
input, button, select { font-family: inherit; }

/* ===== Bookshelf (Home) ===== */
#bookshelf {
  height: 100vh;
  display: flex;
  flex-direction: column;
  transition: opacity 0.3s;
}
.shelf-header {
  padding: 24px 32px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.shelf-header h1 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #e91e63);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.shelf-header h1 i { margin-right: 10px; }
.shelf-actions { display: flex; gap: 12px; align-items: center; }
.btn {
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
  background: var(--accent);
  color: #fff;
}
.btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
.btn-ghost {
  background: transparent;
  color: var(--text);
  padding: 8px;
  border-radius: 50%;
}
.btn-ghost:hover { background: var(--hover); }
.shelf-content {
  flex: 1;
  overflow-y: auto;
  padding: 8px 32px 32px;
}
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 16px;
  padding: 48px;
  text-align: center;
  margin-bottom: 24px;
  transition: all 0.3s;
  cursor: pointer;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--accent);
  background: var(--accent-light);
}
.drop-zone i { font-size: 48px; color: var(--accent); margin-bottom: 12px; }
.drop-zone p { color: var(--text-secondary); margin-top: 8px; }
.drop-zone .formats { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

.book-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 20px;
}
.book-card {
  background: var(--card-bg);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 2px 8px var(--shadow);
  position: relative;
}
.book-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px var(--shadow); background: var(--card-hover); }
.book-cover {
  width: 100%;
  aspect-ratio: 2/3;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  position: relative;
  overflow: hidden;
}
.book-cover img { width: 100%; height: 100%; object-fit: cover; }
.book-cover .placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  font-weight: 700;
  color: #fff;
}
.book-info { padding: 10px 12px; }
.book-info .title {
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.book-info .meta {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 2px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.book-progress-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  background: var(--accent);
  transition: width 0.3s;
}
.book-delete {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  color: #fff;
  border: none;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}
.book-card:hover .book-delete { display: flex; }

/* ===== Local Books Section ===== */
.local-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 8px;
}
.local-section-header h3 {
  font-size: 16px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.local-section-header .local-status {
  font-size: 12px;
  color: var(--text-secondary);
  padding: 4px 10px;
  background: var(--hover);
  border-radius: 12px;
}
.local-section-header .local-status.loading { color: var(--accent); }
.local-section-header .local-status.error { color: #e53935; }
.local-actions { display: flex; gap: 8px; align-items: center; }
.btn-scan {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: all 0.2s;
}
.btn-scan:hover { border-color: var(--accent); color: var(--accent); }
.local-book-badge {
  position: absolute;
  top: 6px;
  left: 6px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: rgba(33,150,243,0.85);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  z-index: 2;
}
.local-empty {
  text-align: center;
  padding: 32px 16px;
  color: var(--text-secondary);
  font-size: 13px;
}
.local-empty i { font-size: 32px; margin-bottom: 8px; display: block; opacity: 0.4; }
.local-empty .hint {
  margin-top: 8px;
  font-size: 12px;
  background: var(--hover);
  border-radius: 8px;
  padding: 12px;
  text-align: left;
  line-height: 1.6;
}
.local-empty .hint code {
  background: var(--bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
  font-family: monospace;
}

/* ===== Reader ===== */
#reader {
  height: 100vh;
  display: none;
  flex-direction: column;
  position: relative;
}
#reader.active { display: flex; }
#bookshelf.hidden { display: none; }

/* Toolbar */
.toolbar {
  height: 48px;
  background: var(--toolbar-bg);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  z-index: 100;
  flex-shrink: 0;
}
.toolbar .left, .toolbar .center, .toolbar .right {
  display: flex;
  align-items: center;
  gap: 4px;
}
.toolbar .left { flex: 1; }
.toolbar .center { flex: 0 0 auto; font-size: 14px; font-weight: 500; max-width: 40%; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.toolbar .right { flex: 1; justify-content: flex-end; }
.toolbar button {
  width: 36px;
  height: 36px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
  position: relative;
}
.toolbar button:hover { background: var(--hover); }
.toolbar button.active { color: var(--accent); }
.toolbar .separator { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

/* Reading Area */
.reader-body {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* Sidebar (TOC, Bookmarks, Search) */
.sidebar {
  width: 0;
  overflow: hidden;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  transition: width 0.3s;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
.sidebar.open { width: 300px; }
.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.sidebar-header h3 { font-size: 15px; font-weight: 600; }
.sidebar-header button { background: none; border: none; color: var(--text); cursor: pointer; font-size: 18px; padding: 4px; }
.sidebar-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-tabs button {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 13px;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.sidebar-tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }
.sidebar-content {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.toc-item {
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text);
  transition: background 0.2s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toc-item:hover { background: var(--hover); }
.toc-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
.toc-item.level-1 { padding-left: 12px; }
.toc-item.level-2 { padding-left: 28px; font-size: 13px; }
.toc-item.level-3 { padding-left: 44px; font-size: 12px; }
.bookmark-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
  margin-bottom: 4px;
}
.bookmark-item:hover { background: var(--hover); }
.bookmark-item .bm-title { font-size: 13px; font-weight: 500; }
.bookmark-item .bm-text { font-size: 12px; color: var(--text-secondary); margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.bookmark-item .bm-time { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
.bookmark-item .bm-delete { float: right; background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 2px; }
.search-box {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.search-box input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  outline: none;
}
.search-box input:focus { border-color: var(--accent); }
.search-result {
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  margin-bottom: 4px;
  transition: background 0.2s;
}
.search-result:hover { background: var(--hover); }
.search-result mark { background: var(--accent-light); color: var(--accent); padding: 0 2px; border-radius: 2px; }

/* Content Area */
.content-area {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#epub-view {
  width: 100%;
  height: 100%;
}
#epub-view iframe {
  border: none;
}
#pdf-view {
  width: 100%;
  height: 100%;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  gap: 16px;
}
#pdf-view canvas {
  max-width: 100%;
  box-shadow: 0 2px 12px var(--shadow);
}
#text-view {
  width: 100%;
  height: 100%;
  overflow-y: auto;
  padding: 40px;
  max-width: 800px;
  margin: 0 auto;
  line-height: 1.8;
  font-size: 16px;
  white-space: pre-wrap;
  word-wrap: break-word;
}
#text-view.markdown {
  white-space: normal;
}
#text-view.markdown h1, #text-view.markdown h2, #text-view.markdown h3 {
  margin-top: 1.5em;
  margin-bottom: 0.5em;
}
#text-view.markdown p { margin-bottom: 1em; }
#text-view.markdown code { background: var(--hover); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
#text-view.markdown pre { background: var(--hover); padding: 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 1em; }
#text-view.markdown blockquote { border-left: 3px solid var(--accent); padding-left: 16px; color: var(--text-secondary); margin-bottom: 1em; }
#text-view.markdown img { max-width: 100%; border-radius: 8px; }
#text-view.markdown table { border-collapse: collapse; width: 100%; margin-bottom: 1em; }
#text-view.markdown th, #text-view.markdown td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
#text-view.markdown th { background: var(--hover); }

/* Page Navigation Arrows */
.nav-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 48px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--hover);
  border: none;
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 20px;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 10;
  border-radius: 8px;
}
.content-area:hover .nav-arrow { opacity: 0.7; }
.nav-arrow:hover { opacity: 1 !important; background: var(--accent-light); color: var(--accent); }
.nav-prev { left: 8px; }
.nav-next { right: 8px; }

/* Progress Bar */
.progress-bar {
  height: 3px;
  background: var(--border);
  flex-shrink: 0;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.3s;
  width: 0;
}

/* Bottom Bar */
.bottom-bar {
  height: 36px;
  background: var(--toolbar-bg);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  font-size: 12px;
  color: var(--text-secondary);
  flex-shrink: 0;
}

/* ===== Settings Panel ===== */
.panel {
  position: absolute;
  top: 48px;
  right: 16px;
  width: 320px;
  background: var(--card-bg);
  border-radius: 12px;
  box-shadow: 0 8px 32px var(--shadow);
  border: 1px solid var(--border);
  z-index: 200;
  display: none;
  overflow: hidden;
}
.panel.open { display: block; }
.panel-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  font-size: 15px;
}
.panel-body { padding: 16px; }
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.setting-row:last-child { margin-bottom: 0; }
.setting-label { font-size: 13px; color: var(--text-secondary); }
.setting-control { display: flex; align-items: center; gap: 8px; }
.setting-control button {
  width: 32px;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}
.setting-control button:hover { border-color: var(--accent); color: var(--accent); }
.setting-control .value { min-width: 40px; text-align: center; font-size: 14px; font-weight: 500; }
.theme-options { display: flex; gap: 8px; }
.theme-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
}
.theme-btn:hover { transform: scale(1.1); }
.theme-btn.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }
.theme-btn[data-theme="light"] { background: #fafafa; border-color: #ddd; }
.theme-btn[data-theme="dark"] { background: #1a1a2e; }
.theme-btn[data-theme="sepia"] { background: #f4ecd8; }
.theme-btn[data-theme="green"] { background: #e8f5e9; }
.font-select {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  outline: none;
}

/* ===== Keyboard Hints ===== */
kbd {
  background: var(--hover);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 11px;
  font-family: monospace;
}

/* ===== Toast ===== */
.toast {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: var(--bg);
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 1000;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== Loading ===== */
.loading-overlay {
  position: absolute;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
}
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Empty State ===== */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-secondary);
  gap: 12px;
}
.empty-state i { font-size: 64px; opacity: 0.3; }
.empty-state p { font-size: 15px; }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .shelf-header { padding: 16px; }
  .shelf-content { padding: 8px 16px 16px; }
  .book-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
  .sidebar.open { width: 260px; }
  .toolbar .center { display: none; }
  .panel { width: 280px; right: 8px; }
  #text-view { padding: 20px; }
}

/* Highlight colors */
.highlight-yellow { background: rgba(255,235,59,0.4); }
.highlight-green { background: rgba(76,175,80,0.3); }
.highlight-blue { background: rgba(33,150,243,0.3); }
.highlight-pink { background: rgba(233,30,99,0.2); }

/* Highlight context menu */
.highlight-menu {
  position: absolute;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 4px 16px var(--shadow);
  padding: 6px;
  display: none;
  z-index: 300;
  gap: 4px;
}
.highlight-menu.show { display: flex; }
.highlight-menu button {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid rgba(0,0,0,0.1);
  cursor: pointer;
  transition: transform 0.2s;
}
.highlight-menu button:hover { transform: scale(1.2); }

/* PDF page controls */
.pdf-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px;
  position: sticky;
  top: 0;
  background: var(--toolbar-bg);
  backdrop-filter: blur(10px);
  z-index: 10;
  border-bottom: 1px solid var(--border);
}
.pdf-controls button {
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
}
.pdf-controls button:hover { border-color: var(--accent); color: var(--accent); }
.pdf-controls span { font-size: 13px; color: var(--text-secondary); }
</style>
</head>
<body data-theme="light">

<!-- ===== Bookshelf ===== -->
<div id="bookshelf">
  <div class="shelf-header">
    <h1><i class="fas fa-book-open"></i>墨阅</h1>
    <div class="shelf-actions">
      <button class="btn-ghost" onclick="toggleThemeQuick()" title="切换主题"><i class="fas fa-adjust"></i></button>
      <label class="btn" style="cursor:pointer">
        <i class="fas fa-plus"></i>打开文件
        <input type="file" id="file-input" accept=".epub,.pdf,.txt,.md,.markdown,.html,.htm,.fb2,.rtf,.csv,.json,.xml,.log" multiple style="display:none">
      </label>
    </div>
  </div>
  <div class="shelf-content">
    <div class="drop-zone" id="drop-zone">
      <i class="fas fa-cloud-upload-alt"></i>
      <p>拖放文件到这里，或点击选择文件</p>
      <div class="formats">支持格式：EPUB · PDF · TXT · Markdown · HTML · FB2 · CSV · JSON · XML</div>
    </div>
    <div id="local-books" style="display:none">
      <div class="local-section-header">
        <h3><i class="fas fa-folder-open"></i> 本地书库</h3>
        <div class="local-actions">
          <span class="local-status" id="local-status"></span>
          <label class="btn-scan" title="选择本地文件夹">
            <i class="fas fa-folder-plus"></i> 导入文件夹
            <input type="file" id="folder-input" accept=".epub,.pdf,.txt,.md,.markdown,.html,.htm,.fb2,.rtf,.csv,.json,.xml,.log" webkitdirectory style="display:none">
          </label>
          <button class="btn-scan" onclick="loadLocalTxtBooks()" title="重新扫描"><i class="fas fa-sync-alt"></i> 刷新</button>
        </div>
      </div>
      <div class="book-grid" id="local-grid"></div>
    </div>
    <div id="recent-books" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
        <h3 style="font-size:16px;color:var(--text-secondary)"><i class="fas fa-history"></i> 最近阅读</h3>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="text" id="shelf-search" placeholder="搜索书名..." style="padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:13px;outline:none">
          <select id="shelf-sort" style="padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:13px;outline:none" onchange="renderBookshelf()">
            <option value="recent">最近阅读</option>
            <option value="name">按书名</option>
            <option value="size">按大小</option>
            <option value="progress">按进度</option>
          </select>
        </div>
      </div>
      <div class="book-grid" id="book-grid"></div>
    </div>
  </div>
</div>

<!-- ===== Reader ===== -->
<div id="reader">
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="left">
      <button onclick="goHome()" title="返回书架"><i class="fas fa-arrow-left"></i></button>
      <button onclick="toggleSidebar()" id="btn-toc" title="目录 / 书签"><i class="fas fa-list-ul"></i></button>
      <div class="separator"></div>
      <button onclick="prevPage()" title="上一页 (←)"><i class="fas fa-chevron-left"></i></button>
      <button onclick="nextPage()" title="下一页 (→)"><i class="fas fa-chevron-right"></i></button>
    </div>
    <div class="center" id="book-title">—</div>
    <div class="right">
      <button onclick="toggleBookmark()" id="btn-bookmark" title="添加书签 (B)"><i class="far fa-bookmark"></i></button>
      <button onclick="toggleSearch()" title="搜索 (Ctrl+F)"><i class="fas fa-search"></i></button>
      <button onclick="toggleSettings()" title="设置"><i class="fas fa-cog"></i></button>
      <button onclick="toggleFullscreen()" title="全屏 (F11)"><i class="fas fa-expand"></i></button>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

  <!-- Body -->
  <div class="reader-body">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3 id="sidebar-title">目录</h3>
        <button onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
      </div>
      <div class="sidebar-tabs">
        <button class="active" onclick="switchSidebarTab('toc')">目录</button>
        <button onclick="switchSidebarTab('bookmarks')">书签</button>
        <button onclick="switchSidebarTab('search')">搜索</button>
      </div>
      <div class="search-box" id="search-box" style="display:none">
        <input type="text" id="search-input" placeholder="搜索内容..." oninput="debounceSearch()">
      </div>
      <div class="sidebar-content" id="sidebar-content"></div>
    </div>

    <!-- Content -->
    <div class="content-area" id="content-area">
      <button class="nav-arrow nav-prev" onclick="prevPage()"><i class="fas fa-chevron-left"></i></button>
      <button class="nav-arrow nav-next" onclick="nextPage()"><i class="fas fa-chevron-right"></i></button>

      <div id="epub-view" style="display:none"></div>
      <div id="pdf-view" style="display:none"></div>
      <div id="text-view" style="display:none"></div>

      <div class="loading-overlay" id="loading" style="display:none"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <span id="reading-info-left"></span>
    <span id="reading-info-center"></span>
    <span id="reading-info-right"></span>
  </div>

  <!-- Settings Panel -->
  <div class="panel" id="settings-panel">
    <div class="panel-header">阅读设置</div>
    <div class="panel-body">
      <div class="setting-row">
        <span class="setting-label">主题</span>
        <div class="theme-options">
          <button class="theme-btn active" data-theme="light" onclick="setTheme('light')" title="浅色"></button>
          <button class="theme-btn" data-theme="dark" onclick="setTheme('dark')" title="深色"></button>
          <button class="theme-btn" data-theme="sepia" onclick="setTheme('sepia')" title="护眼"></button>
          <button class="theme-btn" data-theme="green" onclick="setTheme('green')" title="绿色"></button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">字号</span>
        <div class="setting-control">
          <button onclick="changeFontSize(-1)"><i class="fas fa-minus"></i></button>
          <span class="value" id="font-size-val">16px</span>
          <button onclick="changeFontSize(1)"><i class="fas fa-plus"></i></button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">行高</span>
        <div class="setting-control">
          <button onclick="changeLineHeight(-0.1)"><i class="fas fa-minus"></i></button>
          <span class="value" id="line-height-val">1.8</span>
          <button onclick="changeLineHeight(0.1)"><i class="fas fa-plus"></i></button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">字间距</span>
        <div class="setting-control">
          <button onclick="changeLetterSpacing(-0.5)"><i class="fas fa-minus"></i></button>
          <span class="value" id="letter-spacing-val">0px</span>
          <button onclick="changeLetterSpacing(0.5)"><i class="fas fa-plus"></i></button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">字体</span>
        <select class="font-select" id="font-select" onchange="changeFont(this.value)">
          <option value="system-ui, sans-serif">系统默认</option>
          <option value="'Noto Serif SC', 'Source Han Serif SC', serif">宋体 (衬线)</option>
          <option value="'KaiTi', 'STKaiti', serif">楷体</option>
          <option value="Georgia, 'Times New Roman', serif">Georgia</option>
          <option value="'Courier New', monospace">等宽字体</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">页面间距</span>
        <div class="setting-control">
          <button onclick="changePageGap(-5)"><i class="fas fa-minus"></i></button>
          <span class="value" id="page-gap-val">20px</span>
          <button onclick="changePageGap(5)"><i class="fas fa-plus"></i></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Highlight Menu -->
  <div class="highlight-menu" id="highlight-menu">
    <button style="background:#ffeb3b" onclick="addHighlight('yellow')"></button>
    <button style="background:#4caf50" onclick="addHighlight('green')"></button>
    <button style="background:#2196f3" onclick="addHighlight('blue')"></button>
    <button style="background:#e91e63" onclick="addHighlight('pink')"></button>
    <button style="background:transparent;border:1px solid #999" onclick="removeHighlight()"><i class="fas fa-times" style="font-size:10px;color:#999"></i></button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== State =====
const state = {
  books: JSON.parse(localStorage.getItem('moyue_books') || '[]'),
  currentBook: null,
  format: null,
  epub: null,
  epubRendition: null,
  pdfDoc: null,
  pdfPage: 1,
  pdfScale: 1.5,
  fontSize: parseInt(localStorage.getItem('moyue_fontSize') || '16'),
  lineHeight: parseFloat(localStorage.getItem('moyue_lineHeight') || '1.8'),
  letterSpacing: parseFloat(localStorage.getItem('moyue_letterSpacing') || '0'),
  fontFamily: localStorage.getItem('moyue_fontFamily') || 'system-ui, sans-serif',
  pageGap: parseInt(localStorage.getItem('moyue_pageGap') || '20'),
  theme: localStorage.getItem('moyue_theme') || 'light',
  sidebarTab: 'toc',
  searchTimer: null,
  localBooks: [],
  localBooksMap: {},
};

// Apply saved theme
document.body.setAttribute('data-theme', state.theme);

// ===== 自动加载 filelist.json 中的本地书籍 =====
function autoLoadBooksFromFileList() {
  fetch('filelist.json')
    .then(res => res.json())
    .then(data => {
      if (data.books && Array.isArray(data.books)) {
        state.localBooks = data.books;
        data.books.forEach(book => {
          state.localBooksMap[book.filename] = book;
        });
        renderLocalBooks();
      }
    })
    .catch(err => {
      console.log('未找到 filelist.json 或加载失败:', err);
    });
}

// 渲染本地书籍
function renderLocalBooks() {
  const grid = document.getElementById('local-grid');
  const section = document.getElementById('local-books');
  
  if (state.localBooks.length === 0) {
    section.style.display = 'none';
    return;
  }
  
  section.style.display = 'block';
  grid.innerHTML = '';
  
  state.localBooks.forEach(book => {
    const card = createBookCard(book);
    grid.appendChild(card);
  });
}

// 创建书籍卡片
function createBookCard(book) {
  const card = document.createElement('div');
  card.className = 'book-card';
  card.onclick = () => openBook(book);
  
  const ext = book.filename.split('.').pop().toLowerCase();
  const iconMap = {
    'txt': '📄',
    'md': '✏️',
    'markdown': '✏️',
    'epub': '📖',
    'pdf': '📕',
    'html': '🌐',
    'htm': '🌐'
  };
  const icon = iconMap[ext] || '📚';
  
  card.innerHTML = `
    <div class="book-cover">
      <div class="placeholder" style="background: linear-gradient(135deg, #2196F3, #1976D2);">${icon}</div>
    </div>
    <div class="book-info">
      <div class="title">${book.name || book.filename}</div>
      <div class="meta">
        <span>${formatFileSize(book.size)}</span>
      </div>
    </div>
  `;
  
  return card;
}

function formatFileSize(bytes) {
  if (bytes === 0) return '0 B';
  const k = 1024;
  const sizes = ['B', 'KB', 'MB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
}

function openBook(book) {
  fetch(book.path)
    .then(res => res.text())
    .then(content => {
      state.currentBook = { ...book, content };
      state.format = 'text';
      displayTextContent(content, book);
      showReader();
    })
    .catch(err => {
      showToast('无法加载文件: ' + err.message);
      console.error(err);
    });
}

function displayTextContent(content, book) {
  const textView = document.getElementById('text-view');
  const ext = book.filename.split('.').pop().toLowerCase();
  
  if (ext === 'md' || ext === 'markdown') {
    textView.innerHTML = marked(content);
    textView.className = 'markdown';
  } else {
    textView.textContent = content;
    textView.className = '';
  }
  
  textView.style.display = 'block';
  document.getElementById('epub-view').style.display = 'none';
  document.getElementById('pdf-view').style.display = 'none';
  document.getElementById('book-title').textContent = book.name || book.filename;
}

function showReader() {
  document.getElementById('bookshelf').classList.add('hidden');
  document.getElementById('reader').classList.add('active');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ===== IndexedDB =====
const DB_NAME = 'moyue_db';
let db;

const dbRequest = indexedDB.open(DB_NAME, 1);
dbRequest.onupgradeneeded = e => {
  db = e.target.result;
  if (!db.objectStoreNames.contains('books')) {
    db.createObjectStore('books', { keyPath: 'id', autoIncrement: true });
  }
  if (!db.objectStoreNames.contains('bookmarks')) {
    const store = db.createObjectStore('bookmarks', { keyPath: 'id', autoIncrement: true });
    store.createIndex('bookId', 'bookId', { unique: false });
  }
};
dbRequest.onsuccess = e => {
  db = e.target.result;
};

// ===== 页面加载时自动加载书籍 =====
window.addEventListener('load', () => {
  autoLoadBooksFromFileList();
  renderBookshelf();
});

// 占位符函数
function renderBookshelf() {
  // 现有的 renderBookshelf 逻辑
}

function goHome() {
  document.getElementById('bookshelf').classList.remove('hidden');
  document.getElementById('reader').classList.remove('active');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function switchSidebarTab(tab) {
  state.sidebarTab = tab;
}

function toggleBookmark() {}
function toggleSearch() {}
function toggleSettings() {}
function toggleFullscreen() {}
function prevPage() {}
function nextPage() {}
function changeFontSize(delta) {}
function changeLineHeight(delta) {}
function changeLetterSpacing(delta) {}
function changeFont(font) {}
function changePageGap(delta) {}
function setTheme(theme) {
  state.theme = theme;
  localStorage.setItem('moyue_theme', theme);
  document.body.setAttribute('data-theme', theme);
}
function toggleThemeQuick() {
  const themes = ['light', 'dark', 'sepia', 'green'];
  const currentIdx = themes.indexOf(state.theme);
  const nextTheme = themes[(currentIdx + 1) % themes.length];
  setTheme(nextTheme);
}
function debounceSearch() {}
function addHighlight(color) {}
function removeHighlight() {}
function loadLocalTxtBooks() {}
</script>
</body>
</html>
