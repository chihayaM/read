<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web 阅读器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ===== CSS Variables & Themes ===== */
:root {
  --bg: #fafafa;
  --bg-secondary: #fff;
  --text: #333;
  --text-secondary: #666;
  --border: #e0e0e0;
  --accent: #2196F3;
  --accent-light: #e3f2fd;
  --shadow: rgba(0,0,0,0.08);
  --sidebar-bg: #fff;
  --hover: #f5f5f5;
  --toolbar-bg: rgba(255,255,255,0.95);
  --card-bg: #fff;
  --card-hover: #f0f7ff;
  --overlay: rgba(0,0,0,0.4);
  --scrollbar: #cccccc;
  --scrollbar-hover: #aaaaaa;
}
[data-theme="dark"] {
  --bg: #1a1a2e;
  --bg-secondary: #16213e;
  --text: #e0e0e0;
  --text-secondary: #a0a0a0;
  --border: #2a2a4a;
  --accent: #64b5f6;
  --accent-light: #1e3a5f;
  --shadow: rgba(0,0,0,0.3);
  --sidebar-bg: #16213e;
  --hover: #1e2d4a;
  --toolbar-bg: rgba(26,26,46,0.95);
  --card-bg: #16213e;
  --card-hover: #1e3a5f;
  --overlay: rgba(0,0,0,0.6);
  --scrollbar: #444444;
  --scrollbar-hover: #666666;
}
[data-theme="sepia"] {
  --bg: #f4ecd8;
  --bg-secondary: #faf5e8;
  --text: #5b4636;
  --text-secondary: #8a7560;
  --border: #d4c5a9;
  --accent: #8b6914;
  --accent-light: #f0e6c8;
  --shadow: rgba(91,70,54,0.1);
  --sidebar-bg: #faf5e8;
  --hover: #efe7d0;
  --toolbar-bg: rgba(244,236,216,0.95);
  --card-bg: #faf5e8;
  --card-hover: #f0e6c8;
  --overlay: rgba(91,70,54,0.3);
  --scrollbar: #c4b08a;
  --scrollbar-hover: #a89060;
}
[data-theme="green"] {
  --bg: #e8f5e9;
  --bg-secondary: #f1f8f2;
  --text: #2e4a32;
  --text-secondary: #5a7d5e;
  --border: #c8e6c9;
  --accent: #43a047;
  --accent-light: #e8f5e9;
  --shadow: rgba(46,74,50,0.1);
  --sidebar-bg: #f1f8f2;
  --hover: #d7eed8;
  --toolbar-bg: rgba(232,245,232,0.95);
  --card-bg: #f1f8f2;
  --card-hover: #d7eed8;
  --overlay: rgba(46,74,50,0.3);
  --scrollbar: #a5d6a7;
  --scrollbar-hover: #81c784;
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background 0.3s, color 0.3s;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }
input, button, select { font-family: inherit; }

/* ===== Bookshelf (Home) ===== */
#bookshelf {
  height: 100vh;
  display: flex;
  flex-direction: column;
  transition: opacity 0.3s;
}
.shelf-header {
  padding: 24px 32px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.shelf-header h1 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #e91e63);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.shelf-header h1 i { margin-right: 10px; }
.shelf-actions { display: flex; gap: 12px; align-items: center; }
.btn {
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
  background: var(--accent);
  color: #fff;
}
.btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
.btn-ghost {
  background: transparent;
  color: var(--text);
  padding: 8px;
  border-radius: 50%;
}
.btn-ghost:hover { background: var(--hover); }
.shelf-content {
  flex: 1;
  overflow-y: auto;
  padding: 8px 32px;
}
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 16px;
  padding: 48px;
  text-align: center;
  margin-bottom: 24px;
  transition: all 0.3s;
  cursor: pointer;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--accent);
  background: var(--accent-light);
}
.drop-zone i { font-size: 48px; color: var(--accent); margin-bottom: 12px; }
.drop-zone p { color: var(--text-secondary); margin-top: 8px; }
.drop-zone .formats { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

.book-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 20px;
}
.book-card {
  background: var(--card-bg);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 2px 8px var(--shadow);
  position: relative;
}
.book-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px var(--shadow); background: var(--card-hover); }
.book-cover {
  width: 100%;
  aspect-ratio: 2/3;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  position: relative;
  overflow: hidden;
}
.book-cover img { width: 100%; height: 100%; object-fit: cover; }
.book-cover .placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  font-weight: 700;
  color: #fff;
}
.book-info { padding: 10px 12px; }
.book-info .title {
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.book-info .meta {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 2px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.book-progress-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  background: var(--accent);
  transition: width 0.3s;
}
.book-delete {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  color: #fff;
  border: none;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}
.book-card:hover .book-delete { display: flex; }

/* ===== Local Books Section ===== */
.local-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 8px;
}
.local-section-header h3 {
  font-size: 16px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.local-section-header .local-status {
  font-size: 12px;
  color: var(--text-secondary);
  padding: 4px 10px;
  background: var(--hover);
  border-radius: 12px;
}
.local-section-header .local-status.loading { color: var(--accent); }
.local-section-header .local-status.error { color: #e53935; }
.local-actions { display: flex; gap: 8px; align-items: center; }
.btn-scan {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: all 0.2s;
}
.btn-scan:hover { border-color: var(--accent); color: var(--accent); }
.local-book-badge {
  position: absolute;
  top: 6px;
  left: 6px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: rgba(33,150,243,0.85);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  z-index: 2;
}
.local-empty {
  text-align: center;
  padding: 32px 16px;
  color: var(--text-secondary);
  font-size: 13px;
}
.local-empty i { font-size: 32px; margin-bottom: 8px; display: block; opacity: 0.4; }
.local-empty .hint {
  margin-top: 8px;
  font-size: 12px;
  background: var(--hover);
  border-radius: 8px;
  padding: 12px;
  text-align: left;
  line-height: 1.6;
}
.local-empty .hint code {
  background: var(--bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 1px;
  font-family: monospace;
}

/* ===== Reader ===== */
#reader {
  height: 100vh;
  display: none;
  flex-direction: column;
  position: relative;
}
#reader.active { display: flex; }
#bookshelf.hidden { display: none; }

/* Toolbar */
.toolbar {
  height: 48px;
  background: var(--toolbar-bg);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  z-index: 100;
  flex-shrink: 0;
}
.toolbar .left, .toolbar .center, .toolbar .right {
  display: flex;
  align-items: center;
  gap: 4px;
}
.toolbar .left { flex: 1; }
.toolbar .center { flex: 0 auto; font-size: 14px; font-weight: 500; max-width: 40%; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.toolbar .right { flex: 1; justify-content: flex-end; }
.toolbar button {
  width: 36px;
  height: 36px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
  position: relative;
}
.toolbar button:hover { background: var(--hover); }
.toolbar button.active { color: var(--accent); }
.toolbar .separator { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

/* Reading Area */
.reader-body {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* Sidebar (TOC, Bookmarks, Search) */
.sidebar {
  width: 0;
  overflow: hidden;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  transition: width 0.3s;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
.sidebar.open { width: 300px; }
.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.sidebar-header h3 { font-size: 15px; font-weight: 600; }
.sidebar-header button { background: none; border: none; color: var(--text); cursor: pointer; font-size: 18px; padding: 4px; }
.sidebar-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-tabs button {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 13px;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.sidebar-tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }
.sidebar-content {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.toc-item {
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text);
  transition: background 0.2s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toc-item:hover { background: var(--hover); }
.toc-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
.toc-item.level-1 { padding-left: 12px; }
.toc-item.level-2 { padding-left: 28px; font-size: 13px; }
.toc-item.level-3 { padding-left: 44px; font-size: 12px; }
.bookmark-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
  margin-bottom: 4px;
}
.bookmark-item:hover { background: var(--hover); }
.bookmark-item .bm-title { font-size: 13px; font-weight: 500; }
.bookmark-item .bm-text { font-size: 12px; color: var(--text-secondary); margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.bookmark-item .bm-time { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
.bookmark-item .bm-delete { float: right; background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 2px; }
.search-box {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.search-box input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  outline: none;
}
.search-box input:focus { border-color: var(--accent); }
.search-result {
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  margin-bottom: 4px;
  transition: background 0.2s;
}
.search-result:hover { background: var(--hover); }
.search-result mark { background: var(--accent-light); color: var(--accent); padding: 0 2px; border-radius: 2px; }

/* Content Area */
.content-area {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#epub-view {
  width: 100%;
  height: 100%;
}
#epub-view iframe {
  border: none;
}
#pdf-view {
  width: 100%;
  height: 100%;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  gap: 16px;
}
#pdf-view canvas {
  max-width: 100%;
  box-shadow: 0 2px 12px var(--shadow);
}
#text-view {
  width: 100%;
  height: 100%;
  overflow-y: auto;
  padding: 40px;
  max-width: 800px;
  margin: 0 auto;
  line-height: 1.8;
  font-size: 16px;
  white-space: pre-wrap;
  word-wrap: break-word;
}
#text-view.markdown {
  white-space: normal;
}
#text-view.markdown h1, #text-view.markdown h2, #text-view.markdown h3 {
  margin-top: 1.5em;
  margin-bottom: 0.5em;
}
#text-view.markdown p { margin-bottom: 1em; }
#text-view.markdown code { background: var(--hover); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
#text-view.markdown pre { background: var(--hover); padding: 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 1em; }
#text-view.markdown blockquote { border-left: 3px solid var(--accent); padding-left: 16px; color: var(--text-secondary); margin-bottom: 1em; }
#text-view.markdown img { max-width: 100%; border-radius: 8px; }
#text-view.markdown table { border-collapse: collapse; width: 100%; margin-bottom: 1em; }
#text-view.markdown th, #text-view.markdown td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
#text-view.markdown th { background: var(--hover); }
#text-view.markdown p { margin-bottom: 1em; }
#text-view.markdown li { margin-bottom: 0.5em; }

/* Page Navigation Arows */
.nav-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 48px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--hover);
  border: none;
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 20px;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 10;
  border-radius: 8px;
}
.content-area:hover .nav-arrow { opacity: 0.7; }
.nav-arrow:hover { opacity: 1 !important; background: var(--accent-light); color: var(--accent); }
.nav-prev { left: 8px; }
.nav-next { right: 8px; }

/* Progress Bar */
.progress-bar {
  height: 3px;
  background: var(--border);
  flex-shrink: 0;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.3s;
  width: 0;
}

/* Bottom Bar */
.bottom-bar {
  height: 36px;
  background: var(--toolbar-bg);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  font-size: 12px;
  color: var(--text-secondary);
  flex-shrink: 0;
}

/* ===== Settings Panel ===== */
.panel {
  position: absolute;
  top: 48px;
  right: 16px;
  width: 320px;
  background: var(--card-bg);
  border-radius: 12px;
  box-shadow: 0 8px 32px var(--shadow);
  border: 1px solid var(--border);
  z-index: 200;
  display: none;
  overflow: hidden;
}
.panel.open { display: block; }
.panel-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  font-size: 15px;
}
.panel-body { padding: 16px; }
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.setting-row:last-child { margin-bottom: 0; }
.setting-label { font-size: 13px; color: var(--text-secondary); }
.setting-control { display: flex; align-items: center; gap: 8px; }
.setting-control button {
  width: 32px;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}
.setting-control button:hover { border-color: var(--accent); color: var(--accent); }
.setting-control .value { min-width: 40px; text-align: center; font-size: 14px; font-weight: 500; }
.theme-options { display: flex; gap: 8px; }
.theme-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
}
.theme-btn:hover { transform: scale(1.1); }
.theme-btn.active { border-color: var(--accent); box-shadow: 0 0 2px var(--accent-light); }
.theme-btn[data-theme="light"] { background: #fafafa; border-color: #ddd; }
.theme-btn[data-theme="dark"] { background: #1a1a2e; }
.theme-btn[data-theme="sepia"] { background: #f4ecd8; }
.theme-btn[data-theme="green"] { background: #e8f5e9; }
.font-select {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  outline: none;
}

/* ===== Keyboard Hints ===== */
kbd {
  background: var(--hover);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 11px;
  font-family: monospace;
}

/* ===== Toast ===== */
.toast {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: var(--bg);
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 1000;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== Loading ===== */
.loading-overlay {
  position: absolute;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
}
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Empty State ===== */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-secondary);
  gap: 12px;
}
.empty-state i { font-size: 64px; opacity: 0.3; }
.empty-state p { font-size: 15px; }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .shelf-header { padding: 16px; }
  .shelf-content { padding: 8px 16px; }
  .book-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
  .sidebar.open { width: 260px; }
  .toolbar .center { display: none; }
  .panel { width: 280px; right: 8px; }
  #text-view { padding: 20px; }
}

/* Highlight colors */
.highlight-yellow { background: rgba(255,235,59,0.4); }
.highlight-green { background: rgba(76,175,80,0.3); }
.highlight-blue { background: rgba(33,150,243,0.3); }
.highlight-pink { background: rgba(233,30,99,0.2); }

/* Highlight context menu */

<script>
// ===== State =====
const state = {
  books: JSON.parse(localStorage.getItem('moyue_books') || '[]'),
  currentBook: null,
  format: null,
  epub: null,
  epubRendition: null,
  pdfDoc: null,
  pdfPage: 1,
  pdfScale: 1.5,
  fontSize: parseInt(localStorage.getItem('moyue_fontSize') || '16'),
  lineHeight: parseFloat(localStorage.getItem('moyue_lineHeight') || '1.8'),
  letterSpacing: parseFloat(localStorage.getItem('moyue_letterSpacing') || '0'),
  fontFamily: localStorage.getItem('moyue_fontFamily') || 'system-ui, sans-serif',
  pageGapV: parseInt(localStorage.getItem('moyue_pageGapV') || '20'),
  pageGapH: parseInt(localStorage.getItem('moyue_pageGapH') || '40'),
  paragraphSpacing: parseFloat(localStorage.getItem('moyue_paragraphSpacing') || '1'),
  firstLineIndent: parseFloat(localStorage.getItem('moyue_firstLineIndent') || '2'),
  theme: localStorage.getItem('moyue_theme') || 'light',
  sidebarTab: 'toc',
  searchTimer: null,
  localBooks: [],
  localBooksMap: {},
};

// Apply saved theme
document.body.setAttribute('data-theme', state.theme);

// ===== IndexedDB (large data storage) =====
const DB_NAME = 'moyue_db';
const DB_STORE = 'bookData';
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 2);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbPut(key, val) {
  const db = await openDB();
  return new Promise((res, rej) => { const tx = db.transaction(DB_STORE,'readwrite'); tx.objectStore(DB_STORE).put(val,key); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); });
}
async function dbGet(key) {
  const db = await openDB();
  return new Promise((res, rej) => { const tx = db.transaction(DB_STORE,'readonly'); const r=tx.objectStore(DB_STORE).get(key); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); });
}
async function dbDel(key) {
  const db = await openDB();
  return new Promise((res, rej) => { const tx = db.transaction(DB_STORE,'readwrite'); tx.objectStore(DB_STORE).delete(key); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); });
}

// ===== Local Books (txt/ folder) =====
function getLocalProgress(filename) {
  try {
    const map = JSON.parse(localStorage.getItem('moyue_localProgress') || '{}');
    return map[filename] || { progress: 0, scrollTop: 0 };
  } catch { return { progress: 0, scrollTop: 0 }; }
}
function saveLocalProgress(filename, data) {
  try {
    const map = JSON.parse(localStorage.getItem('moyue_localProgress') || '{}');
    map[filename] = { ...map[filename], ...data };
    localStorage.setItem('moyue_localProgress', JSON.stringify(map));
  } catch {}
}

async function loadLocalTxtBooks() {
  const statusEl = document.getElementById('local-status');
  const gridEl = document.getElementById('local-grid');
  const sectionEl = document.getElementById('local-books');
  sectionEl.style.display = 'block';
  statusEl.textContent = '扫描中...';
  statusEl.className = 'local-status loading';

  const isFileProtocol = location.protocol === 'file:';
  const discovered = [];
  const jsonMeta = {}; // filename -> { title, author } from books.json

  if (!isFileProtocol) {
    // 1. 读 books.json 获取元数据
    try {
      const resp = await fetch('txt/books.json');
      if (resp.ok) {
        const manifest = await resp.json();
        const items = Array.isArray(manifest) ? manifest : (manifest.books || manifest.data || []);
        if (Array.isArray(items)) {
          for (const item of items) {
            const file = item.file || item.path || item.filename || item.name || item;
            const title = item.title || file.replace(/\.[^.]+$/, '').replace(/ \(.*?\)/g, '').trim();
            const filename = file.split('/').pop();
            jsonMeta[filename] = { title, author: item.author || '' };
            discovered.push({ file: `txt/${file}`, title, author: item.author || '', ext: file.split('.').pop().toLowerCase() });
          }
        }
      }
    } catch {}

    // 2. 扫描目录，补充 JSON 中没有的书
    try {
      let dirHtml = null;
      const resp = await fetch('txt/');
      if (resp.ok) {
        dirHtml = await resp.text();
      }
      // GitHub Pages 不支持目录列表，用 API 兜底
      if (!dirHtml || dirHtml.length < 200) {
        try {
          const apiResp = await fetch('https://api.github.com/repos/chihayaM/read/contents/txt');
          if (apiResp.ok) {
            const files = await apiResp.json();
            for (const f of files) {
              if (f.type !== 'file') continue;
              const filename = f.name;
              if (filename.toLowerCase() === 'books.json' || filename.toLowerCase() === 'index.json') continue;
              if (discovered.some(d => d.file.split('/').pop() === filename)) continue;
              const ext = filename.split('.').pop().toLowerCase();
              if (!['txt','md','markdown','log','csv','json','xml','html','htm','fb2','rtf','epub','pdf'].includes(ext)) continue;
              const meta = jsonMeta[filename];
              const title = meta ? meta.title : filename.replace(/\.[^.]+$/, '').replace(/ \(.*?\)/g, '').trim();
              discovered.push({ file: `txt/${filename}`, title, author: meta ? meta.author : '', ext });
            }
          }
        } catch {}
      }
      // 普通目录列表解析
      if (dirHtml && dirHtml.length >= 200) {
        const linkRegex = /href="([^"?][^"]*\.(?:txt|md|markdown|log|csv|json|xml|html|htm|fb2|rtf|epub|pdf))"/gi;
        let match;
        while ((match = linkRegex.exec(dirHtml)) !== null) {
          const href = match[1];
          if (href === '../' || href === '..' || href.startsWith('?')) continue;
          const filename = decodeURIComponent(href.replace(/^\//, ''));
          if (filename.toLowerCase() === 'books.json' || filename.toLowerCase() === 'index.json') continue;
          if (discovered.some(d => d.file.split('/').pop() === filename)) continue;
          const ext = filename.split('.').pop().toLowerCase();
          const meta = jsonMeta[filename];
          const title = meta ? meta.title : filename.replace(/\.[^.]+$/, '').replace(/ \(.*?\)/g, '').trim();
          discovered.push({ file: `txt/${filename}`, title, author: meta ? meta.author : '', ext });
        }
      }
    } catch {}
  }

  const filtered = discovered.filter(item => {
    const fname = item.file.split('/').pop().toLowerCase();
    return fname !== 'books.json' && fname !== 'index.json';
  });

  filtered.forEach(item => {
    if (!item.title || item.title === item.file.split('/').pop()) {
      item.title = item.file.split('/').pop().replace(/\.[^.]+$/, '');
    }
    item.title = item.title.replace(/\.(txt|md|markdown|log|csv|json|xml|html|htm|rtf|fb2|epub|pdf)$/i, '');
  });

  state.localBooksMap = {};
  for (const item of filtered) {
    const filename = item.file.split('/').pop();
    state.localBooksMap[filename] = item;
  }
  state.localBooks = filtered;

  renderLocalBooks();

  if (filtered.length > 0) {
    statusEl.textContent = `${filtered.length} 本`;
    statusEl.className = 'local-status';
  } else {
    statusEl.textContent = '';
    statusEl.className = 'local-status';
    if (isFileProtocol) {
      gridEl.innerHTML = `<div class="local-empty" style="grid-column:1/-1"><i class="fas fa-folder-open"></i><p>本地文件无法自动扫描</p><div class="hint">浏览器安全限制：<code>file://</code> 协议下无法自动读取文件夹。<br><br><strong>解决方案（任选一种）：</strong><br><br><strong>方案 1：用本地服务器打开（推荐）</strong><br>在 index.html 所在目录运行：<br><code>python3 -m http.server 8080</code><br>然后访问 <code>http://localhost:8080</code><br><br><strong>方案 2：导入文件夹</strong><br>点击上方「导入文件夹」按钮，选择包含书籍的文件夹即可。</div></div>`;
    } else {
      gridEl.innerHTML = `<div class="local-empty" style="grid-column:1/-1"><i class="fas fa-folder-open"></i><p>未发现本地书籍</p><div class="hint"><strong>自动加载方式：</strong><br>在 index.html 同目录下创建 <code>txt/</code> 文件夹，放入书籍文件后点击「刷新」。<br><br><strong>可选：</strong>创建 <code>txt/books.json</code> 指定书名：<br><code>[{"file":"book.txt","title":"书名"}]</code><br><br><strong>或：</strong>点击「导入文件夹」选择本地文件夹批量导入。</div></div>`;
    }
  }
}

async function extractLocalCover(item) {
  const filename = item.file.split('/').pop();
  const cacheKey = 'moyue_cover_' + filename;
  const cached = localStorage.getItem(cacheKey);
  if (cached) return cached;
  if (item.ext !== 'epub') return null;
  try {
    const resp = await fetch(item.file);
    if (!resp.ok) return null;
    const ab = await resp.arrayBuffer();
    const book = ePub(ab);
    await book.ready;
    const coverUrl = await book.coverUrl();
    book.destroy();
    if (coverUrl) {
      // blob URL 会在 destroy 后失效，转成 data URL 再缓存
      const imgResp = await fetch(coverUrl);
      const blob = await imgResp.blob();
      const dataUrl = await new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      });
      localStorage.setItem(cacheKey, dataUrl);
      return dataUrl;
    }
  } catch (e) { console.warn('封面提取失败:', filename, e); }
  return null;
}

function renderLocalBooks() {
  const grid = document.getElementById('local-grid');
  const section = document.getElementById('local-books');
  if (state.localBooks.length === 0) { grid.innerHTML = ''; return; }
  section.style.display = 'block';
  const colors = ['#009688','#4caf50','#8bc34a','#cddc39','#ff9800','#ff5722','#795548','#607d8b'];
  grid.innerHTML = state.localBooks.map((item, i) => {
    const filename = item.file.split('/').pop();
    const prog = getLocalProgress(filename);
    const progress = Math.round((prog.progress || 0) * 100);
    const ext = item.ext.toUpperCase();
    const color = colors[i % colors.length];
    const cleanTitle = (item.title || '').replace(/\.(txt|md|markdown|log|csv|json|xml|html|htm|rtf|fb2|epub|pdf)$/i, '').replace(/\.[^.]+$/, '');
    const cacheKey = 'moyue_cover_' + filename;
    const cachedCover = localStorage.getItem(cacheKey);
    const coverHtml = cachedCover
      ? `<img src="${cachedCover}" alt="">`
      : `<div class="placeholder" style="background:linear-gradient(135deg,${color},${color}dd)">${ext}</div>`;
    return `<div class="book-card" onclick="openLocalBook('${filename}')"><div class="book-cover">${coverHtml}<span class="local-book-badge"><i class="fas fa-folder"></i></span></div><div class="book-info"><div class="title" title="${cleanTitle}">${cleanTitle}</div><div class="meta"><span>${item.author || '本地'}</span><span>${progress}%</span></div><div class="book-progress-bar" style="width:${progress}%"></div></div></div>`;
  }).join('');
  // 异步提取未缓存的封面
  state.localBooks.forEach(async (item, i) => {
    const filename = item.file.split('/').pop();
    const cacheKey = 'moyue_cover_' + filename;
    if (localStorage.getItem(cacheKey)) return;
    const coverUrl = await extractLocalCover(item);
    if (coverUrl) {
      const cards = grid.querySelectorAll('.book-card');
      if (cards[i]) {
        const coverEl = cards[i].querySelector('.book-cover');
        const placeholder = coverEl.querySelector('.placeholder');
        if (placeholder) {
          const img = document.createElement('img');
          img.src = coverUrl;
          img.alt = '';
          placeholder.replaceWith(img);
        }
      }
    }
  });
}

async function openLocalBook(filename) {
  const item = state.localBooksMap[filename];
  if (!item) return;

  const prog = getLocalProgress(filename);
  const ext = item.ext;
  const formatMap = {
    epub: 'epub', pdf: 'pdf',
    txt: 'text', md: 'markdown', markdown: 'markdown',
    htm: 'html', html: 'html', fb2: 'fb2', rtf: 'text',
    log: 'text', csv: 'text', json: 'text', xml: 'text'
  };
  const format = formatMap[ext] || 'text';

  const book = {
    id: 'local_' + filename,
    name: item.title || filename,
    format,
    size: item._blob ? item._blob.size : 0,
    data: null,
    cover: null,
    lastRead: Date.now(),
    progress: prog.progress || 0,
    location: null,
    bookmarks: [],
    highlights: [],
    _local: true,
    _filename: filename,
    _path: item.file,
    _scrollTop: prog.scrollTop || 0
  };

  showLoading(true);
  try {
    if (item._blob) {
      if (format === 'epub' || format === 'pdf') {
        book.data = await item._blob.arrayBuffer();
        book.size = item._blob.size;
      } else {
        book.data = await item._blob.text();
      }
    } else {
      const resp = await fetch(item.file);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      if (format === 'epub' || format === 'pdf') {
        book.data = await resp.arrayBuffer();
        book.size = book.data.byteLength;
      } else {
        book.data = await resp.text();
        book.size = book.data.length;
      }
    }
  } catch (err) {
    showLoading(false);
    showToast('加载失败: ' + err.message);
    return;
  }

  state.currentBook = book;
  state.format = book.format;

  document.getElementById('bookshelf').classList.add('hidden');
  document.getElementById('reader').classList.add('active');
  document.getElementById('book-title').textContent = book.name;
  hideAllViews();

  try {
    switch (book.format) {
      case 'epub': await openEpub(book); break;
      case 'pdf': await openPdf(book); break;
      case 'html': openHtml(book); break;
      case 'markdown': openMarkdown(book); break;
      case 'fb2': openFb2(book); break;
      default: openText(book);
    }
  } catch (err) {
    console.error(err);
    showToast('打开失败: ' + err.message);
    goHome();
  }
  showLoading(false);
}

async function handleFiles(files) {
  for (const file of files) { await processFile(file); }
  renderBookshelf();
}

async function processFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  const formatMap = {
    epub: 'epub', pdf: 'pdf', txt: 'text', md: 'markdown', markdown: 'markdown',
    html: 'html', htm: 'html', fb2: 'fb2', rtf: 'text', csv: 'text',
    json: 'text', xml: 'text', log: 'text'
  };
  const format = formatMap[ext];
  if (!format) { showToast(`不支持的格式: .${ext}`); return; }

  const id = 'book_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);

  // Read file data — store ArrayBuffer directly for binary formats (avoids btoa/atob corruption)
  let data;
  let _arrayBuffer = null;
  if (format === 'epub' || format === 'pdf') {
    _arrayBuffer = await file.arrayBuffer();
    data = _arrayBuffer; // IndexedDB can store ArrayBuffer natively
  } else {
    data = await file.text();
  }

  // Try to extract cover from EPUB
  let cover = null;
  if (format === 'epub' && _arrayBuffer) {
    try {
      const book = ePub(_arrayBuffer);
      await book.ready;
      cover = await book.coverUrl();
      book.destroy();
    } catch(e) { console.warn('EPUB cover extraction failed:', e); }
  }

  try { await dbPut(id, data); } catch(e) { console.error('IndexedDB save failed:', e); showToast('保存失败: ' + e.message); return; }

  const bookMeta = {
    id, name: file.name, format, size: file.size,
    cover, lastRead: Date.now(),
    progress: 0, location: null, bookmarks: [], highlights: []
  };

  const existing = state.books.findIndex(b => b.name === file.name);
  if (existing >= 0) {
    try { await dbDel(state.books[existing].id); } catch(e) {}
    state.books.splice(existing, 1);
  }

  state.books.unshift(bookMeta);
  saveBooks();
  showToast(`已添加: ${file.name}`);
}

// ===== Bookshelf =====
function renderBookshelf() {
  const grid = document.getElementById('book-grid');
  const recent = document.getElementById('recent-books');
  if (state.books.length === 0) { recent.style.display = 'none'; return; }
  recent.style.display = 'block';

  let books = [...state.books];
  const searchEl = document.getElementById('shelf-search');
  const sortEl = document.getElementById('shelf-sort');
  const query = searchEl ? searchEl.value.trim().toLowerCase() : '';
  const sortBy = sortEl ? sortEl.value : 'recent';

  if (query) { books = books.filter(b => b.name.toLowerCase().includes(query)); }

  switch (sortBy) {
    case 'name': books.sort((a, b) => a.name.localeCompare(b.name)); break;
    case 'size': books.sort((a, b) => (b.size || 0) - (a.size || 0)); break;
    case 'progress': books.sort((a, b) => (b.progress || 0) - (a.progress || 0)); break;
    default: books.sort((a, b) => (b.lastRead || 0) - (a.lastRead || 0)); break;
  }

  grid.innerHTML = books.map(book => {
    const ext = book.format === 'markdown' ? 'MD' : book.format.toUpperCase();
    const colors = ['#e91e63','#9c27b0','#673ab7','#3f51b5','#2196f3','#009688','#4caf50','#ff9800'];
    const color = colors[book.name.length % colors.length];
    const progress = Math.round((book.progress || 0) * 100);
    const sizeStr = book.size > 1048576 ? (book.size/1048576).toFixed(1)+'MB' : (book.size/1024).toFixed(0)+'KB';
    return `<div class="book-card" onclick="openBook('${book.id}')"><div class="book-cover">${book.cover ? `<img src="${book.cover}" alt="">` : `<div class="placeholder" style="background:linear-gradient(135deg,${color},${color}dd)">${ext}</div>`}<button class="book-delete" onclick="event.stopPropagation();deleteBook('${book.id}')"><i class="fas fa-trash"></i></button></div><div class="book-info"><div class="title" title="${book.name}">${book.name}</div><div class="meta"><span>${sizeStr}</span><span>${progress}%</span></div></div><div class="book-progress-bar" style="width:${progress}%"></div></div>`;
  }).join('');
}

  state.books = state.books.filter(b => b.id !== id);

// ===== EPUB =====
async function openEpub(book) {
  const view = document.getElementById('epub-view');
  view.style.display = 'block';
  view.innerHTML = '';

  // Convert data to ArrayBuffer — handle both ArrayBuffer (new) and base64 string (legacy)
  let ab;
  if (book.data instanceof ArrayBuffer) {
    ab = book.data;
  } else if (book.data instanceof Uint8Array) {
    ab = book.data.buffer;
  } else if (typeof book.data === 'string') {
    // Legacy base64 data
    try {
      const binary = atob(book.data);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      ab = bytes.buffer;
    } catch(e) {
      throw new Error('EPUB 数据解码失败: ' + e.message);
    }
  } else {
    throw new Error('EPUB 数据格式不正确');
  }

  try {
    state.epub = ePub(ab);
    await state.epub.ready;
  } catch(e) {
    throw new Error('EPUB 解析失败: ' + e.message);
  }

  state.epubRendition = state.epub.renderTo(view, {
    width: '100%', height: '100%',
    spread: 'none', flow: 'paginated'
  });

  // 单一 content hook：每页加载时注入主题色 + 段落样式
  state.epubRendition.hooks.content.register((contents) => {
    const c = state.epubThemeColors[state.epubCurrentTheme] || state.epubThemeColors.light;
    const indent = state.firstLineIndent || 0;
    const paraSpace = state.paragraphSpacing || 1;
    const gapV = state.pageGapV || 0;
    const gapH = state.pageGapH || 0;
    const fs = state.fontSize || 16;
    const lh = state.lineHeight || 1.8;
    const ls = state.letterSpacing || 0;
    const ff = state.fontFamily || 'system-ui, sans-serif';
    const style = contents.document.createElement('style');
    style.id = 'moyue-theme';
    style.textContent = `body{background:${c.bg}!important;color:${c.fg}!important;padding:${gapV}px ${gapH}px!important;font-size:${fs}px!important;line-height:${lh}!important;letter-spacing:${ls}px!important;font-family:${ff}!important}a:link,a:hover,a:active{color:${c.link}!important}img,video,svg{max-width:100%;height:auto}p{text-indent:${indent}em!important;margin-bottom:${paraSpace}em!important}`;
    contents.document.head.appendChild(style);
  });

  const navigation = await state.epub.loaded.navigation;
  renderToc(navigation.toc);

  if (book.location) {
    await state.epubRendition.display(book.location);
  } else if (book.progress > 0) {
    await state.epubRendition.display(book.progress);
  } else {
    await state.epubRendition.display();
  }

  state.epubRendition.on('relocated', location => {
    if (!location || !location.start) return;
    const progress = state.epub.locations.percentageFromCfi(location.start.cfi);
    book.progress = progress || 0;
    book.location = location.start.cfi;
    updateProgress(book.progress);
    updateReadingInfo(location);
    saveBooks();
    updateBookmarkButton();
  });

  await state.epub.locations.generate(1600);

  if (book.location) {
    await state.epubRendition.display(book.location);
  }

  state.epubRendition.on('keydown', handleKeyNav);

  // EPUB iframe 滚轮翻页（iframe 内事件不冒泡到外层 document）
  const epubWheelHandler = (() => {
    let accum = 0, timer = null;
    return (e) => {
      e.preventDefault();
      accum += e.deltaY;
      clearTimeout(timer);
      timer = setTimeout(() => { accum = 0; }, 200);
      if (Math.abs(accum) >= 30) {
        if (accum > 0) state.epubRendition.next();
        else state.epubRendition.prev();
        accum = 0;
      }
    };
  })();

  // 方案1：通过 rendered 事件绑定到 iframe 内部文档
  state.epubRendition.on('rendered', (section, view) => {
    try {
      const doc = view.document || (view.iframe && view.iframe.contentDocument);
      if (doc) doc.addEventListener('wheel', epubWheelHandler, { passive: false });
    } catch(e) {}
  });

  // 方案2：绑定到 epub-view 容器（兜底）
  document.getElementById('epub-view').addEventListener('wheel', epubWheelHandler, { passive: false });

  state.epubRendition.on('selected', (cfiRange, contents) => {
    showHighlightMenu(cfiRange, contents);
  });

  if (book.highlights) {
    book.highlights.forEach(h => {
      try { state.epubRendition.annotations.highlight(h.cfiRange, {}, (e) => {}, h.color); } catch(e) {}
    });
  }
}

  dark:   { bg: '#1a1a2e', fg: '#e0e0e0', link: '#64b5f6' },

// ===== PDF =====
async function openPdf(book) {
  const view = document.getElementById('pdf-view');
  view.style.display = 'block';
  view.innerHTML = '';

  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // Convert data to ArrayBuffer — handle both ArrayBuffer (new) and base64 string (legacy)
  let ab;
  if (book.data instanceof ArrayBuffer) {
    ab = book.data;
  } else if (book.data instanceof Uint8Array) {
    ab = book.data.buffer;
  } else if (typeof book.data === 'string') {
    try {
      const binary = atob(book.data);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      ab = bytes.buffer;
    } catch(e) {
      throw new Error('PDF 数据解码失败: ' + e.message);
    }
  } else {
    throw new Error('PDF 数据格式不正确');
  }

  try {
    state.pdfDoc = await pdfjsLib.getDocument({ data: ab }).promise;
  } catch(e) {
    throw new Error('PDF 解析失败: ' + e.message);
  }
  state.pdfPage = book.progress ? Math.max(1, Math.round(book.progress * state.pdfDoc.numPages)) : 1;

  const controls = document.createElement('div');
  controls.className = 'pdf-controls';
  controls.innerHTML = `<button onclick="pdfPrev()"><i class="fas fa-chevron-left"></i></button><span id="pdf-page-info">${state.pdfPage} / ${state.pdfDoc.numPages}</span><button onclick="pdfNext()"><i class="fas fa-chevron-right"></i></button><div style="flex:1"></div><button onclick="pdfZoom(-0.2)"><i class="fas fa-search-minus"></i></button><span id="pdf-zoom">${Math.round(state.pdfScale*100)}%</span><button onclick="pdfZoom(0.2)"><i class="fas fa-search-plus"></i></button>`;
  view.appendChild(controls);

  const canvasWrap = document.createElement('div');
  canvasWrap.id = 'pdf-canvas-wrap';
  canvasWrap.style.cssText = 'flex:1;overflow:auto;display:flex;flex-direction:column;align-items:center;gap:16px;padding:16px;';
  view.appendChild(canvasWrap);

  await renderPdfPage(state.pdfPage);
  updateProgress((state.pdfPage - 1) / state.pdfDoc.numPages);

  try {
    const outline = await state.pdfDoc.getOutline();
    if (outline && outline.length) { renderPdfToc(outline); }
    else { document.getElementById('sidebar-content').innerHTML = '<div class="empty-state"><p>无目录</p></div>'; }
  } catch(e) {
    document.getElementById('sidebar-content').innerHTML = '<div class="empty-state"><p>无目录</p></div>';
  }
}

async function renderPdfPage(num) {
  if (!state.pdfDoc || num < 1 || num > state.pdfDoc.numPages) return;
  state.pdfPage = num;
  const wrap = document.getElementById('pdf-canvas-wrap');
  wrap.innerHTML = '';

  const page = await state.pdfDoc.getPage(num);
  const viewport = page.getViewport({ scale: state.pdfScale });
  const canvas = document.createElement('canvas');
  canvas.height = viewport.height;
  canvas.width = viewport.width;
  canvas.style.maxWidth = '100%';
  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport }).promise;
  wrap.appendChild(canvas);

  document.getElementById('pdf-page-info').textContent = `${num} / ${state.pdfDoc.numPages}`;
  state.currentBook.progress = (num - 1) / state.pdfDoc.numPages;
  updateProgress(state.currentBook.progress);
  document.getElementById('reading-info-right').textContent = `${Math.round(state.currentBook.progress*100)}%`;
  if (state.currentBook._local && state.currentBook._filename) {
    saveLocalProgress(state.currentBook._filename, { progress: state.currentBook.progress });
  } else {
    saveBooks();
  }
}

function pdfPrev() { renderPdfPage(state.pdfPage - 1); }
function pdfNext() { renderPdfPage(state.pdfPage + 1); }
function pdfZoom(delta) {
  state.pdfScale = Math.max(0.5, Math.min(3, state.pdfScale + delta));
  document.getElementById('pdf-zoom').textContent = Math.round(state.pdfScale*100) + '%';
  renderPdfPage(state.pdfPage);
}

async function renderPdfToc(outline, level = 0) {
  const container = document.getElementById('sidebar-content');
  if (level === 0) container.innerHTML = '';
  for (const item of outline) {
    const div = document.createElement('div');
    div.className = `toc-item level-${level}`;
    div.textContent = item.title;
    div.onclick = async () => {
      if (item.dest) {
        try {
          let pageIndex;
          if (typeof item.dest === 'string') {
            const dest = await state.pdfDoc.getDestination(item.dest);
            const ref = dest[0];
            pageIndex = await state.pdfDoc.getPageIndex(ref);
          } else {
            const ref = item.dest[0];
            pageIndex = await state.pdfDoc.getPageIndex(ref);
          }
          renderPdfPage(pageIndex + 1);
        } catch(e) { console.error(e); }
      }
    };
    container.appendChild(div);
    if (item.items && item.items.length) { await renderPdfToc(item.items, level + 1); }
  }
}

// ===== Text / Markdown / HTML / FB2 =====
function openText(book) {
  const view = document.getElementById('text-view');
  view.style.display = 'block';
  view.className = '';
  view.textContent = book.data;
  applyTextStyles();
  restoreScroll(book);
  document.getElementById('sidebar-content').innerHTML = '<div class="empty-state"><p>纯文本无目录</p></div>';
  view.onscroll = () => saveTextProgress(view);
}

function openMarkdown(book) {
  const view = document.getElementById('text-view');
  view.style.display = 'block';
  view.className = 'markdown';
  view.innerHTML = marked.parse(book.data);
  applyTextStyles();
  restoreScroll(book);
  generateTextToc(view);
  view.onscroll = () => saveTextProgress(view);
}

function openHtml(book) {
  const view = document.getElementById('text-view');
  view.style.display = 'block';
  view.className = '';
  let html = book.data;
  html = html.replace(/<script[\s\S]*?<\/script>/gi, '');
  html = html.replace(/\son\w+\s*=\s*(["'])[\s\S]*?\1/gi, '');
  html = html.replace(/\son\w+\s*=\s*[^\s>]*/gi, '');
  html = html.replace(/href\s*=\s*["']?\s*javascript:/gi, 'href="#" data-blocked="');
  html = html.replace(/src\s*=\s*["']?\s*javascript:/gi, 'src="" data-blocked="');
  view.innerHTML = html;
  applyTextStyles();
  restoreScroll(book);
  generateTextToc(view);
  view.onscroll = () => saveTextProgress(view);
}

function openFb2(book) {
  const view = document.getElementById('text-view');
  view.style.display = 'block';
  view.className = '';
  try {
    const parser = new DOMParser();
    const xml = parser.parseFromString(book.data, 'text/xml');
    let html = '';
    const titleInfo = xml.querySelector('title-info');
    if (titleInfo) {
      const bookTitle = titleInfo.querySelector('book-title');
      const author = titleInfo.querySelector('author');
      if (bookTitle) html += `<h1>${bookTitle.textContent}</h1>`;
      if (author) {
        const fn = author.querySelector('first-name');
        const ln = author.querySelector('last-name');
        html += `<p style="color:var(--text-secondary);margin-bottom:2em">作者: ${fn ? fn.textContent : ''} ${ln ? ln.textContent : ''}</p>`;
      }
    }
    const body = xml.querySelector('body');
    if (body) {
      const sections = body.querySelectorAll('section');
      sections.forEach(sec => {
        const pElements = sec.querySelectorAll('p, title, subtitle, epigraph');
        pElements.forEach(p => {
          if (p.tagName === 'title' || p.tagName === 'subtitle') { html += `<h2>${p.textContent}</h2>`; }
          else { html += `<p>${p.textContent}</p>`; }
        });
      });
    }
    view.innerHTML = html || '<p>无法解析 FB2 内容</p>';
  } catch(e) { view.textContent = book.data; }
  applyTextStyles();
  restoreScroll(book);
  generateTextToc(view);
  view.onscroll = () => saveTextProgress(view);
}

function applyTextStyles() {
  const view = document.getElementById('text-view');
  view.style.fontSize = state.fontSize + 'px';
  view.style.lineHeight = state.lineHeight;
  view.style.letterSpacing = state.letterSpacing + 'px';
  view.style.fontFamily = state.fontFamily;
  view.style.padding = state.pageGapV + 'px ' + state.pageGapH + 'px';
  // 段落间距 + 首行缩进（直接修改 DOM 元素样式）
  view.querySelectorAll('p').forEach(p => {
    p.style.marginBottom = state.paragraphSpacing + 'em';
    p.style.textIndent = state.firstLineIndent + 'em';
  });
  view.querySelectorAll('li').forEach(li => {
    li.style.marginBottom = (state.paragraphSpacing * 0.5) + 'em';
  });
  // EPUB 容器也要应用页边距
  const epubView = document.getElementById('epub-view');
  if (epubView) epubView.style.padding = state.pageGapV + 'px ' + state.pageGapH + 'px';
}

function saveTextProgress(view) {
  if (!state.currentBook) return;
  const pct = view.scrollTop / (view.scrollHeight - view.clientHeight);
  state.currentBook.progress = Math.min(1, Math.max(0, pct));
  updateProgress(state.currentBook.progress);
  state.currentBook._scrollTop = view.scrollTop;
  document.getElementById('reading-info-right').textContent = `${Math.round(state.currentBook.progress*100)}%`;
  if (state.currentBook._local && state.currentBook._filename) {
    saveLocalProgress(state.currentBook._filename, { progress: state.currentBook.progress, scrollTop: view.scrollTop });
    renderLocalBooks();
  } else {
    saveBooks();
  }
}

function restoreScroll(book) {
  const view = document.getElementById('text-view');
  if (book._scrollTop) { setTimeout(() => view.scrollTop = book._scrollTop, 50); }
  else if (book.progress > 0) { setTimeout(() => view.scrollTop = book.progress * (view.scrollHeight - view.clientHeight), 50); }
}

function generateTextToc(container) {
  const tocContainer = document.getElementById('sidebar-content');
  const headings = container.querySelectorAll('h1, h2, h3, h4');
  if (headings.length === 0) { tocContainer.innerHTML = '<div class="empty-state"><p>无标题结构</p></div>'; return; }
  tocContainer.innerHTML = '';
  headings.forEach((h, i) => {
    const level = parseInt(h.tagName[1]) - 1;
    h.id = `heading-${i}`;
    const div = document.createElement('div');
    div.className = `toc-item level-${Math.min(level, 3)}`;
    div.textContent = h.textContent.trim().substring(0, 50);
    div.onclick = () => h.scrollIntoView({ behavior: 'smooth' });
    tocContainer.appendChild(div);
  });
}

// ===== Navigation =====
function prevPage() {
  if (state.format === 'epub' && state.epubRendition) { state.epubRendition.prev(); }
  else if (state.format === 'pdf') { pdfPrev(); }
  else { const view = document.getElementById('text-view'); view.scrollBy({ top: -view.clientHeight + 50, behavior: 'smooth' }); }
}

function nextPage() {
  if (state.format === 'epub' && state.epubRendition) { state.epubRendition.next(); }
  else if (state.format === 'pdf') { pdfNext(); }
  else { const view = document.getElementById('text-view'); view.scrollBy({ top: view.clientHeight - 50, behavior: 'smooth' }); }
}

// ===== Sidebar =====
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

function switchSidebarTab(tab) {
  state.sidebarTab = tab;
  document.querySelectorAll('.sidebar-tabs button').forEach((btn, i) => {
    btn.classList.toggle('active', ['toc','bookmarks','search'][i] === tab);
  });
  document.getElementById('search-box').style.display = tab === 'search' ? 'block' : 'none';
  if (tab === 'bookmarks') renderBookmarks();
  else if (tab === 'search') document.getElementById('search-input').focus();
}

function renderBookmarks() {
  const container = document.getElementById('sidebar-content');
  const book = state.currentBook;
  if (!book || !book.bookmarks || book.bookmarks.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>暂无书签</p></div>';
    return;
  }
  container.innerHTML = book.bookmarks.map((bm, i) => `<div class="bookmark-item" onclick="goToBookmark(${i})"><button class="bm-delete" onclick="event.stopPropagation();deleteBookmark(${i})"><i class="fas fa-times"></i></button><div class="bm-title">${bm.title || '书签 ' + (i+1)}</div><div class="bm-text">${bm.text || ''}</div><div class="bm-time">${new Date(bm.time).toLocaleString()}</div></div>`).join('');
}

function toggleBookmark() {
  const book = state.currentBook;
  if (!book) return;
  if (!book.bookmarks) book.bookmarks = [];

  if (book.format === 'epub' && state.epubRendition) {
    const loc = state.epubRendition.currentLocation();
    if (!loc || !loc.start) return;
    const cfi = loc.start.cfi;
    const existing = book.bookmarks.findIndex(b => b.cfi === cfi);
    if (existing >= 0) { book.bookmarks.splice(existing, 1); showToast('已移除书签'); }
    else { book.bookmarks.push({ cfi, title: '位置 ' + Math.round((book.progress||0)*100) + '%', text: '', time: Date.now() }); showToast('已添加书签'); }
  } else {
    const view = document.getElementById('text-view');
    const pct = book.progress || 0;
    book.bookmarks.push({ progress: pct, scrollTop: view.scrollTop, title: '位置 ' + Math.round(pct*100) + '%', text: '', time: Date.now() });
    showToast('已添加书签');
  }
  saveBooks();
  updateBookmarkButton();
}

function goToBookmark(index) {
  const book = state.currentBook;
  const bm = book.bookmarks[index];
  if (!bm) return;
  if (book.format === 'epub' && bm.cfi) { state.epubRendition.display(bm.cfi); }
  else if (bm.progress !== undefined) {
    if (book.format === 'pdf') { renderPdfPage(Math.max(1, Math.round(bm.progress * state.pdfDoc.numPages))); }
    else { const view = document.getElementById('text-view'); view.scrollTop = bm.scrollTop || (bm.progress * (view.scrollHeight - view.clientHeight)); }
  }
}

function deleteBookmark(index) {
  state.currentBook.bookmarks.splice(index, 1);
  saveBooks();
  renderBookmarks();
  showToast('已删除书签');
}

function updateBookmarkButton() {
  const btn = document.getElementById('btn-bookmark');
  const book = state.currentBook;
  if (!book || !book.bookmarks) { btn.innerHTML = '<i class="far fa-bookmark"></i>'; return; }
  let isBookmarked = false;
  if (book.format === 'epub' && state.epubRendition) {
    const loc = state.epubRendition.currentLocation();
    if (loc && loc.start) { isBookmarked = book.bookmarks.some(b => b.cfi === loc.start.cfi); }
  }
  btn.innerHTML = isBookmarked ? '<i class="fas fa-bookmark" style="color:var(--accent)"></i>' : '<i class="far fa-bookmark"></i>';
}

// ===== Search =====
function toggleSearch() {
  const sidebar = document.getElementById('sidebar');
  if (!sidebar.classList.contains('open')) { sidebar.classList.add('open'); switchSidebarTab('search'); }
  else if (state.sidebarTab === 'search') { sidebar.classList.remove('open'); }
  else { switchSidebarTab('search'); }
}

function debounceSearch() {
  clearTimeout(state.searchTimer);
  state.searchTimer = setTimeout(performSearch, 30);
}

async function performSearch() {
  const query = document.getElementById('search-input').value.trim();
  const container = document.getElementById('sidebar-content');
  if (!query || query.length < 2) { container.innerHTML = ''; return; }

  if (state.currentBook.format === 'epub' && state.epub) {
    const results = [];
    const spine = state.epub.spine;
    for (let i = 0; i < spine.items.length && results.length < 50; i++) {
      const item = spine.items[i];
      try {
        const doc = await item.load(state.epub.load.bind(state.epub));
        const text = doc.body ? doc.body.textContent : '';
        const idx = text.toLowerCase().indexOf(query.toLowerCase());
        if (idx >= 0) {
          const start = Math.max(0, idx - 30);
          const end = Math.min(text.length, idx + query.length + 30);
          results.push({ cfi: item.cfiBase, excerpt: text.substring(start, end), href: item.href });
        }
      } catch(e) {}
    }
    container.innerHTML = results.length ? results.map((r, i) => `<div class="search-result" onclick="state.epubRendition.display('${r.href}')"><div style="font-size:11px;color:var(--text-secondary);margin-bottom:2px">${r.href}</div><div>${r.excerpt.replace(new RegExp(query, 'gi'), m => `<mark>${m}</mark>`)}</div></div>`).join('') : '<div class="empty-state"><p>未找到结果</p></div>';
  } else {
    const view = document.getElementById('text-view');
    const text = view.textContent || '';
    const results = [];
    let idx = 0;
    const lowerText = text.toLowerCase();
    const lowerQuery = query.toLowerCase();
    while ((idx = lowerText.indexOf(lowerQuery, idx)) >= 0 && results.length < 50) {
      const start = Math.max(0, idx - 30);
      const end = Math.min(text.length, idx + query.length + 30);
      results.push({ pos: idx, excerpt: text.substring(start, end) });
      idx += query.length;
    }
    container.innerHTML = results.length ? results.map((r, i) => `<div class="search-result" onclick="scrollToSearchResult(${r.pos})"><div>${r.excerpt.replace(new RegExp(query, 'gi'), m => `<mark>${m}</mark>`)}</div></div>`).join('') : '<div class="empty-state"><p>未找到结果</p></div>';
  }
}

function scrollToSearchResult(pos) {
  const view = document.getElementById('text-view');
  const ratio = pos / (view.textContent || '').length;
  view.scrollTop = ratio * view.scrollHeight;
}

// ===== Highlights =====
function showHighlightMenu(cfiRange, contents) {
  const menu = document.getElementById('highlight-menu');
  const selection = contents.document.getSelection();
  if (!selection || selection.isCollapsed) return;
  const range = selection.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  menu.style.top = (rect.top - 40) + 'px';
  menu.style.left = rect.left + 'px';
  menu.classList.add('show');
  menu._cfiRange = cfiRange;
}

function addHighlight(color) {
  const menu = document.getElementById('highlight-menu');
  const cfiRange = menu._cfiRange;
  if (!cfiRange || !state.epubRendition) return;
  state.epubRendition.annotations.highlight(cfiRange, {}, (e) => {}, color);
  if (!state.currentBook.highlights) state.currentBook.highlights = [];
  state.currentBook.highlights.push({ cfiRange, color });
  saveBooks();
  menu.classList.remove('show');
  showToast('已添加高亮');
}

function removeHighlight() { document.getElementById('highlight-menu').classList.remove('show'); }

// ===== Fullscreen =====
function toggleFullscreen() {
  if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); }
  else { document.exitFullscreen(); }
}

// ===== Progress =====
function updateProgress(pct) {
  document.getElementById('progress-fill').style.width = Math.round(pct * 100) + '%';
}

// ===== Go Home =====
function goHome() {
  if (state.currentBook && state.currentBook._local && state.currentBook._filename) {
    const view = document.getElementById('text-view');
    if (view) { saveLocalProgress(state.currentBook._filename, { progress: state.currentBook.progress, scrollTop: view.scrollTop }); }
  }

  if (state.epub) { state.epub.destroy(); state.epub = null; state.epubRendition = null; }
  state.pdfDoc = null;
  state.currentBook = null;
  state.format = null;

  document.getElementById('reader').classList.remove('active');
  document.getElementById('bookshelf').classList.remove('hidden');
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('settings-panel').classList.remove('open');
  renderBookshelf();
  renderLocalBooks();
}

// ===== Toast =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ===== Keyboard =====
document.addEventListener('keydown', e => {
  if (!document.getElementById('reader').classList.contains('active')) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  switch(e.key) {
    case 'ArrowLeft': case 'PageUp': e.preventDefault(); prevPage(); break;
    case 'ArrowRight': case 'PageDown': case ' ': e.preventDefault(); nextPage(); break;
    case 'Escape': document.getElementById('sidebar').classList.remove('open'); document.getElementById('settings-panel').classList.remove('open'); break;
    case 'b': case 'B': toggleBookmark(); break;
    case 'f': case 'F': if (e.ctrlKey || e.metaKey) { e.preventDefault(); toggleSearch(); } break;
    case 'F11': e.preventDefault(); toggleFullscreen(); break;
  }
});

function handleKeyNav(e) {
  if (e.key === 'ArrowLeft') prevPage();
  else if (e.key === 'ArrowRight') nextPage();
}

// ===== Mouse Wheel Page Turn =====
let _wheelTimer = null;
let _wheelAccum = 0;
document.addEventListener('wheel', e => {
  if (!document.getElementById('reader').classList.contains('active')) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  // 侧边栏内滚动不触发翻页
  if (e.target.closest('#sidebar')) return;

  const fmt = state.format;
  const isPaginated = (fmt === 'epub' || fmt === 'pdf');
  const view = document.getElementById('text-view');
  const pdfView = document.getElementById('pdf-view');

  if (pdfView && pdfView.style.display !== 'none') {
    const scrollTop = pdfView.scrollTop;
    const atTop = scrollTop <= 2;
    const atBottom = scrollTop + pdfView.clientHeight >= pdfView.scrollHeight - 2;
    if ((e.deltaY < 0 && !atTop) || (e.deltaY > 0 && !atBottom)) return;
  }

  if (!isPaginated) {
    if (view && view.style.display !== 'none') {
      const atTop = view.scrollTop <= 2;
      const atBottom = view.scrollTop + view.clientHeight >= view.scrollHeight - 2;
      if ((e.deltaY < 0 && !atTop) || (e.deltaY > 0 && !atBottom)) return;
    }
  }

  _wheelAccum += e.deltaY;
  clearTimeout(_wheelTimer);
  _wheelTimer = setTimeout(() => { _wheelAccum = 0; }, 200);

  if (Math.abs(_wheelAccum) < 30) return;
  e.preventDefault();

  if (_wheelAccum > 0) nextPage();
  else prevPage();
  _wheelAccum = 0;
}, { passive: false });

// Close panels on outside click
document.addEventListener('click', e => {
  const panel = document.getElementById('settings-panel');
  if (panel.classList.contains('open') && !panel.contains(e.target) && !e.target.closest('[onclick*="toggleSettings"]')) { panel.classList.remove('open'); }
  const menu = document.getElementById('highlight-menu');
  if (menu.classList.contains('show') && !menu.contains(e.target)) { menu.classList.remove('show'); }
});
